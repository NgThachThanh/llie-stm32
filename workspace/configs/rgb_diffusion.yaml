project_name: stm32_llie_rgb

data:
  image_size: 96

paths:
  datasets_root: ../datasets
  outputs_root: outputs

model:
  type: one_step_rgb_student
  base_channels: 24

teacher:
  type: diffusion_enhancement
  target_mode: optional_rgb_teacher_dir

train:
  batch_size: 8
  num_workers: 2
  epochs: 20
  lr: 0.001
  weight_decay: 0.0001
  seed: 42
  device: cuda

loss:
  l1: 1.0
  ssim: 0.2
  perceptual: 0.1
  distill: 0.5
