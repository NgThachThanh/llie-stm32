project_name: stm32_llie_teacher

data:
  image_size: 96

paths:
  datasets_root: ../datasets
  outputs_root: outputs

model:
  type: tiny_diffusion_teacher
  base_channels: 32
  time_dim: 32

diffusion:
  steps: 16

train:
  batch_size: 8
  num_workers: 2
  epochs: 20
  lr: 0.001
  weight_decay: 0.0001
  seed: 42
  device: cuda
